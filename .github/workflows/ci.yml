name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swiftpm:
    name: SwiftPM Build And Tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        run: swift build

      - name: Run Swift package tests
        run: swift test

  xcode:
    name: Xcode App Build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app bundle
        run: |
          xcodebuild \
            -project AudioPilot.xcodeproj \
            -scheme AudioPilot \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/AudioPilotDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build
